version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    env_file:
      - .env
    volumes:
      - .:/app

  dashboard:
    image: node:20-alpine
    working_dir: /app/dashboard/frontend
    command: sh -c "npm install && npm run dev"
    ports:
      - "8001:8001"
    depends_on:
      - app
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true

